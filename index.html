<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ViolenceGuard — 5-Class AI Message Intelligence System">
    <title>ViolenceGuard AI | Advanced Classification</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

<nav class="navbar">
    <div class="brand">
        <div class="icon">🛡️</div>
        <span>ViolenceGuard AI</span>
    </div>
</nav>

<div class="stats-bar">
    <div class="stat-card">
        <div class="stat-icon normal">✅</div>
        <div class="stat-info">
            <div class="stat-value" id="stat-normal">0</div>
            <div class="stat-label">Normal</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon spam">📢</div>
        <div class="stat-info">
            <div class="stat-value" id="stat-spam">0</div>
            <div class="stat-label">Spam</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon cybercrime">🪝</div>
        <div class="stat-info">
            <div class="stat-value" id="stat-cybercrime">0</div>
            <div class="stat-label">Cybercrime</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon violent">⚔️</div>
        <div class="stat-info">
            <div class="stat-value" id="stat-violent">0</div>
            <div class="stat-label">Violent</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon suspicious">⚠️</div>
        <div class="stat-info">
            <div class="stat-value" id="stat-suspicious">0</div>
            <div class="stat-label">Suspicious</div>
        </div>
    </div>
</div>

<div class="main">
    <section>
        <div class="section-title">🔍 Live Message Intelligence</div>
        <div class="card">
            <textarea class="detector-textarea" id="input-text"
                      placeholder="Enter any message (English, Hindi, Telugu, Tamil, etc.)..."></textarea>
            <div class="detector-actions">
                <button class="btn btn-primary" id="btn-analyze" onclick="analyzeMessage()">🔬 Analyze Message</button>
                <button class="btn btn-outline" onclick="clearResult()">Clear</button>
            </div>
            <div id="result-area"></div>
        </div>
    </section>

    <section>
        <div class="annotation-header">
            <div class="section-title" style="margin:0">✏️ Manual Annotation Queue</div>
            <button class="btn btn-primary" id="btn-load" onclick="loadUnlabeled()">📥 Load Unlabeled</button>
        </div>
        <div class="annotation-grid" id="annotation-grid"></div>
    </section>
</div>

<script>
const API = "https://violenceguard-backend.onrender.com";
const counts = { NORMAL: 0, SPAM: 0, CYBERCRIME: 0, VIOLENT: 0, SUSPICIOUS: 0 };

async function analyzeMessage() {
    const text = document.getElementById("input-text").value.trim();
    if (!text) return;

    const btn = document.getElementById("btn-analyze");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Analyzing...';

    try {
        const res = await fetch(API + "/predict", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text }),
        });
        const data = await res.json();
        
        counts[data.label]++;
        updateStats();
        showResult(data);
    } catch (err) {
        document.getElementById("result-area").innerHTML = '<div class="result-card normal">Connection Error</div>';
    } finally {
        btn.disabled = false;
        btn.innerHTML = "🔬 Analyze Message";
    }
}

function updateStats() {
    for (const key in counts) {
        const el = document.getElementById(`stat-${key.toLowerCase()}`);
        if (el) el.textContent = counts[key];
    }
}

function showResult(data) {
    const sev = data.severity;
    const label = data.label;
    const pct = Math.round(data.confidence * 100);

    const icons = { NORMAL: "✅", SPAM: "📢", CYBERCRIME: "🪝", VIOLENT: "⚔️", SUSPICIOUS: "⚠️" };

    document.getElementById("result-area").innerHTML = `
        <div class="result-card ${sev}">
            <span class="result-badge ${sev}">${icons[label] || ""} ${label}</span>
            <div class="confidence-bar-container">
                <div class="confidence-label">Confidence: ${pct}%</div>
                <div class="confidence-bar">
                    <div class="confidence-fill ${sev}" style="width:${pct}%"></div>
                </div>
            </div>
        </div>
    `;
}

function clearResult() {
    document.getElementById("input-text").value = "";
    document.getElementById("result-area").innerHTML = "";
}

async function loadUnlabeled() {
    const btn = document.getElementById("btn-load");
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span> Loading...';

    try {
        const res = await fetch(API + "/unlabeled");
        const data = await res.json();
        const grid = document.getElementById("annotation-grid");
        grid.innerHTML = "";

        for (const msg of data.messages) {
            const predRes = await fetch(API + "/predict", {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text: msg }),
            });
            const pred = await predRes.json();
            grid.appendChild(createMsgCard(msg, pred));
        }
    } catch (err) {
        grid.innerHTML = '<div class="card">Failed to load content.</div>';
    } finally {
        btn.disabled = false;
        btn.innerHTML = "📥 Load Unlabeled";
    }
}

function createMsgCard(text, pred) {
    const card = document.createElement("div");
    card.className = "msg-card";
    const sev = pred.severity;
    const highConf = pred.confidence >= 0.85;

    card.innerHTML = `
        <div class="msg-text">"${escapeHtml(text)}"</div>
        <div class="msg-prediction">
            <span class="mini-badge ${sev}">${pred.label}</span>
            <span class="confidence-text">${Math.round(pred.confidence*100)}%</span>
            ${highConf ? '<span class="mini-badge auto">Auto</span>' : ''}
        </div>
        <div class="msg-actions">
            ${highConf ? '<div class="labeled-check">✓ Verified</div>' : `
                <button class="btn btn-normal" onclick="annotate(this, '${escapeJs(text)}', 'NORMAL')">Safe</button>
                <button class="btn btn-spam" onclick="annotate(this, '${escapeJs(text)}', 'SPAM')">Spam</button>
                <button class="btn btn-cybercrime" onclick="annotate(this, '${escapeJs(text)}', 'CYBERCRIME')">Crime</button>
                <button class="btn btn-violent" onclick="annotate(this, '${escapeJs(text)}', 'VIOLENT')">Threat</button>
                <button class="btn btn-suspicious" onclick="annotate(this, '${escapeJs(text)}', 'SUSPICIOUS')">Risk</button>
            `}
        </div>
    `;
    if (highConf) { card.classList.add("labeled"); autoAnnotate(text, pred.label); }
    return card;
}

async function autoAnnotate(text, label) {
    try {
        await fetch(API + "/annotate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, label }),
        });
    } catch (err) {}
}

async function annotate(btn, text, label) {
    const parent = btn.parentElement;
    parent.innerHTML = '<span class="spinner spinner-dark"></span>';
    try {
        const res = await fetch(API + "/annotate", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ text, label }),
        });
        const data = await res.json();
        if (data.status === "ok") {
            parent.innerHTML = `<div class="labeled-check">✓ ${label}</div>`;
        }
    } catch (err) { parent.innerHTML = "Error"; }
}

function escapeHtml(str) { const d = document.createElement("div"); d.textContent = str; return d.innerHTML; }
function escapeJs(str) { return str.replace(/\\/g, "\\\\").replace(/'/g, "\\'").replace(/"/g, '\\"'); }
</script>
</body>
</html>
